<script>
    $(document).ready(function () {
        {% if site.google_scholar_stats_use_cdn %}
        var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@latest/'
        {% else %}
        var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/'
        {% endif %}
        function updateTotalCitations(data) {
            var totalCitation = data['citedby'] || data['cited_by'] || 0;
            if (document.getElementById('total_cit')) {
                document.getElementById('total_cit').textContent = totalCitation;
            }
            var citationEles = document.getElementsByClassName('show_paper_citations')
            Array.prototype.forEach.call(citationEles, element => {
                var paperId = element.getAttribute('data')
                var numCitations = data['publications'] && data['publications'][paperId] && data['publications'][paperId]['num_citations']
                if (numCitations !== undefined) {
                    element.innerHTML = '| Citations: ' + numCitations;
                }
            });
        }

        function showCitationError() {
            if (document.getElementById('total_cit')) {
                document.getElementById('total_cit').textContent = 'unavailable';
            }
        }

        function fetchScholarData(url, fallback) {
            $.getJSON(url)
                .done(updateTotalCitations)
                .fail(function () {
                    if (fallback) {
                        fallback();
                    } else {
                        showCitationError();
                    }
                });
        }

        fetchScholarData(gsDataBaseUrl + "google-scholar-stats/gs_data.json", function () {
            var rawUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/main/google-scholar-stats/gs_data.json';
            fetchScholarData(rawUrl, showCitationError);
        });
    })
</script>
